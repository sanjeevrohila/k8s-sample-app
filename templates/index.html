<!DOCTYPE html>
<html>
<head>

<title>DevOps Technology Gallery</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

h1{
    margin-top:40px;
}

.container{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap:30px;
    padding:50px;
}

.card{
    background:#ffffff10;
    padding:25px;
    border-radius:15px;
    backdrop-filter: blur(5px);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100px;
}

.footer{
    margin-top:40px;
    opacity:0.8;
}

</style>

</head>

<body>

<h1>🚀 DevOps Technology Gallery</h1>

<div class="container">

{% for t in tech %}

<div class="card">
<img src="{{ url_for('static', filename='images/' + t.img) }}">
<h3>{{ t.name }}</h3>
</div>

{% endfor %}

</div>

<div class="footer">
Running inside Docker container
</div>

</body>
</html>
